<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — TaskFlow</title>
    <link rel="stylesheet" href="../static/css/auth.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?
family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="toast-container" id="toast-container"></div>

    <div class="auth-container">
      <div class="auth-card">
        <h1>Create account</h1>
        <p>Minimal productivity starts here</p>
        <form id="register-form">
          <input type="text" placeholder="Full Name" id="register-name" required />
          <input type="email" placeholder="Email" id="register-email" required />
          <input type="password" placeholder="Password" id="register-password" required />
          <input type="password" placeholder="Repeat password" id="register-password-repeat" required>
          <button type="submit">Register</button>
        </form>
        <span>
          Already have an account?
          <a href="/auth/login">Login</a>
        </span>
      </div>
    </div>


    <script src="/static/js/main.js" defer type="module"></script>

  </body>
</html>
