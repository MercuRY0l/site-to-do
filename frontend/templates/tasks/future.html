  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow</title>
    <link rel="stylesheet" href="../../static/css/future.css" />
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?
family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

  <body>
    <div class="toast-container" id="toast-container"></div>


    <div class="modal-overlay" id="task-modal">
      <div class="modal">
        <div class="modal-header">
          <h2>Новая задача</h2>
          <button class="modal-close" id="close-modal">&times;</button>
        </div>

        <form id="task-form">
          <div class="form-group">
            <label>Название</label>
            <input
              type="text"
              name="title"
              placeholder="Введите название задачи"
              required
            />
          </div>

          <div class="form-group">
            <label>Описание</label>
            <textarea
              name="description"
              placeholder="Введите описание"
              required
            ></textarea>
          </div>

          <div class="form-group">
            <label>Дата</label>
            <input type="datetime-local" name="date" required />
          </div>

          <div class="form-group">
            <label>Приоритет</label>
            <select name="priority">
              <option value="p0">0 — Нет приоритета</option>
              <option value="p1">1 — Очень низкий</option>
              <option value="p2">2 — Низкий</option>
              <option value="p3">3 — Средний</option>
              <option value="p4">4 — Высокий</option>
              <option value="p5">5 — Критический</option>
            </select>
          </div>

          <button type="submit" class="save-task-btn">Создать задачу</button>
        </form>
      </div>
    </div>

    <div class="app-layout">
      <aside class="sidebar">
        <div>
          <div class="logo">TaskFlow</div>

          <div class="sidebar-actions">
            <button class="search-btn">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>

            <span>Поиск</span>
            </button>
            <button class="primary-btn">+ Добавить задачу</button>
          </div>
         
          <nav class="menu">
            <a href="/">Входящие</a>
            <a href="/today">Сегодня</a>
            <a href="/future">Предстоящие</a>
            <a href="/reports">Отчет</a>
          </nav>
        </div>
        <div class="profile-card">
          <div class="avatar">
            <img src="/static/images/default-avatar-icon.png" alt="avatar" />
          </div>
        </div>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <div>
            <h1>Предстоящие</h1>
          </div>
        </header>
