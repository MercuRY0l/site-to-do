<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow</title>
    <link rel="stylesheet" href="../static/css/reports.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?
family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="toast-container" id="toast-container"></div>

    <div class="app-layout">
      <aside class="sidebar">
        <div>
          <div class="logo">TaskFlow</div>
          <nav class="menu">
            <a href="/">Входящие</a>
            <a href="/today">Сегодня</a>
            <a href="/future">Предстоящие</a>
            <a href="/reports">Отчет</a>
          </nav>
        </div>
        <div class="profile-card">
          <div class="avatar">
            <img src="/static/images/default-avatar-icon.png" alt="avatar" />
          </div>
        </div>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <div>
            <h1>Отчеты</h1>
          </div>
        </header>

        <section class="reports-task-list"></section>

      </main>
    </div>

    <script src="../static/js/main.js" defer type="module"></script>
  </body>
</html>
